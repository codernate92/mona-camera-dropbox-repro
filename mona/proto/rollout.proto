syntax = "proto2";

package mona;

message Rollout {
  optional int32 initial_state = 1;
  map<int32, int32> steps_to_box_milestones = 2;
  optional int32 num_boxes_in_hole = 3;
  repeated int32 trajectory = 4 [packed = true];
}

message RolloutStats {
  optional int32 num_initial_states = 1;
  optional float average_boxes_in_hole = 2;
  message BoxMilestone {
    // The number of initial states where this milestone was the highest
    // milestone reached.
    optional int32 num_initial_states = 1;
    // The ith entry in the step_counts field is the number of rollouts that
    // reached this milestone in i steps.
    repeated int32 step_counts = 2 [packed = true];
  }
  // The nth entry in this field contains data about rollouts that got n boxes
  // in the hole.
  repeated BoxMilestone box_milestones = 3;
}

message RolloutIteration {
  repeated Rollout rollouts = 1;
  optional RolloutStats stats = 2;
}

message RolloutIterations {
  repeated RolloutIteration iterations = 1;
}
